name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Unit tests (no data dependency)
        run: python -m pytest tests/test_qgp_physics.py tests/test_constants.py -v --tb=short
      - name: Integration tests (data-dependent, skipped if no data)
        run: python -m pytest tests/test_data_generation.py -v --tb=short
      - name: Type check (core modules)
        run: mypy src/qgp_physics.py src/constants.py src/io_utils.py
